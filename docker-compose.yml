version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - tg_data:/app/data
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:///./data/app.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3003:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8001
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  tg_data:
